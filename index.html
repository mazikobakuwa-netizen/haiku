<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>The Untruth Truth</title>
	<link rel="stylesheet" href="styles.css">
   <style>
	
	   @import url('https://fonts.googleapis.com/css2?family=Edu+AU+VIC+WA+NT+Guides:wght@400..700&display=swap');

	   body {
	       background-image: url('cagedbird.jpg');
	       background-repeat: no repeat;
	       background-size: cover;
	       background-position: center;
	       background-attachment: fixed;
	   }
  		.spin {
			  display: inline-block;
			  cursor: pointer;
			}
			
			.spin:active {
			  animation: spin-once 5s ease forwards;
			}
			
			@keyframes spin-once{
			  from {transform: rotate(0deg); }
			  to {transform: rotate(360deg); }
			}
	   

  </style>
</head>

<body>
	<p> <span class="spin">Some cages are mental and some cages are physical.</span> </p> 
	<br>
	<p> <span class="spin"> For example, my cage is myself. </span> </p>
	<br>
	<p> <span class="spin"><br><br>Therefore, when I look in the mirror, I am not sure if today I see the bird or the cage. </span> </p>
</body>
